name: CI

# See README.md "Running the CI checks locally" for how to reproduce every job here on a
# workstation before pushing.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build, test, coverage, static analysis
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu runners have Docker pre-installed, so mvn test/verify here also runs
    # every @Testcontainers(disabledWithoutDocker = true) Postgres test in the repo - including
    # Flyway-applying-every-migration-from-empty and Hibernate ddl-auto=validate, since those
    # tests use the default (non "local-test") profile against the Testcontainers Postgres
    # instance. There is deliberately no separate "migration tests" job: it would just re-run the
    # same suite a second time.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and verify (unit + Postgres/Testcontainers tests + coverage gate + SpotBugs)
        run: mvn --batch-mode --no-transfer-progress verify
        env:
          # spring-boot-starter-actuator's JwtService fails fast at startup without a real secret
          # (see JwtService#init) - any 32+ byte value works for CI, it never needs to verify
          # tokens issued by a real environment.
          JWT_SECRET: ci-only-jwt-signing-secret-not-for-real-use-0123456789

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 14

      - name: Upload surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

  frontend:
    name: Frontend build, lint, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  dependency-and-secret-scan:
    name: Dependency + secret scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Trivy's filesystem scan covers both known-CVE dependency scanning (equivalent to OWASP
      # Dependency-Check for this repo's Maven + npm dependencies) and secret scanning (equivalent
      # to Gitleaks) in one pass, rather than running two separate tools with overlapping setup.
      - name: Trivy filesystem scan (dependencies + secrets)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

  docker:
    name: Docker build + image scan
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t taskpriority-backend:${{ github.sha }} .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: taskpriority-backend:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
          # Base-image OS package CVEs with no fix available yet are out of the app's control;
          # failing the build on those would block every PR on upstream's schedule, not this
          # repo's code. Dependency CVEs (already covered above) and anything with a fix are
          # still blocking.
          ignore-unfixed: true

      - name: Verify the container runs as a non-root user
        run: |
          user=$(docker run --rm taskpriority-backend:${{ github.sha }} id -u)
          echo "Container UID: $user"
          if [ "$user" = "0" ]; then
            echo "::error::Container runs as root (UID 0) - see the Dockerfile's USER directive."
            exit 1
          fi
