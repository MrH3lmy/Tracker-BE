version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: taskpriority-db
    environment:
      POSTGRES_DB: taskpriority
      POSTGRES_USER: taskpriority
      POSTGRES_PASSWORD: taskpriority
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskpriority -d taskpriority"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskpriority-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://db:5432/taskpriority
      DB_USERNAME: taskpriority
      DB_PASSWORD: taskpriority
    ports:
      - "8080:8080"

  frontend:
    image: node:22-alpine
    container_name: taskpriority-frontend
    working_dir: /app/frontend
    depends_on:
      - app
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  frontend_node_modules:
