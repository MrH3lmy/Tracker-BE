services:
  db:
    image: postgres:16-alpine
    container_name: taskpriority-db
    mem_limit: 512m
    cpus: 0.5
    environment:
      POSTGRES_DB: taskpriority
      POSTGRES_USER: taskpriority
      POSTGRES_PASSWORD: taskpriority
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskpriority -d taskpriority"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskpriority-app
    mem_limit: 768m
    cpus: 1.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://db:5432/taskpriority
      DB_USERNAME: taskpriority
      DB_PASSWORD: taskpriority
      # Local-dev-only JWT signing secret. This file is local Docker Compose infrastructure,
      # not application config - never reuse this value in a real deployment; override
      # JWT_SECRET with a real random secret there instead.
      JWT_SECRET: local-docker-compose-dev-only-jwt-secret-do-not-use-in-prod
      # This stack serves both frontend and backend over plain HTTP - a browser will silently
      # refuse to set/send a Secure cookie there. Only disable this for local, non-TLS setups.
      COOKIE_SECURE: "false"
    ports:
      - "8080:8080"

  frontend:
    image: node:22-alpine
    container_name: taskpriority-frontend
    working_dir: /app
    mem_limit: 1g
    cpus: 1.0
    depends_on:
      - app
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "
        if [ ! -f node_modules/.package-lock.json ] || ! cmp -s package-lock.json node_modules/.package-lock.json;
        then npm ci; fi &&
        npm run dev -- --host 0.0.0.0
      "

volumes:
  postgres_data:
  frontend_node_modules:
