spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:taskdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

# Fixed, non-secret signing key for tests only - never reused outside the local-test profile.
app.security.jwt.secret=local-test-only-jwt-signing-secret-not-for-real-use-0123456789

# The reminder producer/dispatcher jobs iterate every user and mutate data on a fixed schedule;
# disabled in tests so a long-lived @SpringBootTest context can't fire them mid-assertion.
app.reminders.scheduling-enabled=false

