# Explicit production profile. Activate with SPRING_PROFILES_ACTIVE=prod (in addition to the base
# application.properties, which still applies - Spring merges profile-specific properties on top
# of the base file rather than replacing it).

# Swagger UI and the raw OpenAPI JSON are development/exploration tools; disabling them in
# production reduces the attack surface (no API shape/schema disclosure to unauthenticated
# scanners) without affecting the actual API, which is unaffected by springdoc being on or off.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Only the liveness/readiness health endpoint is exposed in production - no /actuator/info either,
# to avoid leaking build metadata to unauthenticated callers. Health itself intentionally stays
# unauthenticated (permitAll in SecurityConfig) since orchestrator health checks don't send
# credentials, but it only ever returns UP/DOWN plus liveness/readiness state, never internals.
management.endpoints.web.exposure.include=health

# Structured (JSON) logging in production - see logback-spring.xml's prod <springProfile> section.
# Never log full request/response bodies, tokens, or password hashes in application code:
# AuthService/JwtService already avoid this (see their class comments); keep that invariant when
# adding new logging.
