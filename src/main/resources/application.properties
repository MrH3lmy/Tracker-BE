spring.application.name=task-priority-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskpriority}
spring.datasource.username=${DB_USERNAME:taskpriority}
spring.datasource.password=${DB_PASSWORD:taskpriority}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Comma-separated browser origins allowed to call the API during local/frontend development.
# Override with CORS_ALLOWED_ORIGINS when the frontend is served from a different host or port.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Maximum multipart upload sizes for screenshot requests. Keep these at or above the business validation limit below.
spring.servlet.multipart.max-file-size=${NOTE_SCREENSHOT_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${NOTE_SCREENSHOT_MAX_REQUEST_SIZE:6MB}

# Maximum screenshot attachment size for notes, in bytes (default 5 MiB).
app.notes.screenshots.max-file-size-bytes=${NOTE_SCREENSHOT_MAX_FILE_SIZE_BYTES:5242880}
