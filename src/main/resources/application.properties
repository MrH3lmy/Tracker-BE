spring.application.name=task-priority-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskpriority}
spring.datasource.username=${DB_USERNAME:taskpriority}
spring.datasource.password=${DB_PASSWORD:taskpriority}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Comma-separated browser origins allowed to call the API during local/frontend development.
# Override with CORS_ALLOWED_ORIGINS when the frontend is served from a different host or port.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Maximum multipart upload sizes for screenshot requests. Keep these at or above the business validation limit below.
spring.servlet.multipart.max-file-size=${NOTE_SCREENSHOT_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${NOTE_SCREENSHOT_MAX_REQUEST_SIZE:6MB}

# Maximum screenshot attachment size for notes, in bytes (default 5 MiB).
app.notes.screenshots.max-file-size-bytes=${NOTE_SCREENSHOT_MAX_FILE_SIZE_BYTES:5242880}

# JWT signing secret for access tokens. MUST be set via the JWT_SECRET environment variable
# (at least 32 random bytes) in every real environment - there is deliberately no default here,
# since a leaked/guessable signing secret is a total authentication bypass.
app.security.jwt.secret=${JWT_SECRET:}
app.security.jwt.access-token-ttl-minutes=${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
app.security.jwt.refresh-token-ttl-days=${JWT_REFRESH_TOKEN_TTL_DAYS:30}

# Entitlement limits for the FREE tier. PREMIUM users are unlimited.
app.entitlement.ai-quota.free-monthly-limit=${AI_QUOTA_FREE_MONTHLY_LIMIT:20}
app.entitlement.storage-quota.free-bytes=${STORAGE_QUOTA_FREE_BYTES:104857600}
app.entitlement.session-cap.free-max-active=${SESSION_CAP_FREE_MAX_ACTIVE:1}
app.entitlement.saved-view-cap.free-max=${SAVED_VIEW_CAP_FREE_MAX:1}

# Reminder producer/outbox dispatcher scheduled jobs. Safe to run on multiple app instances at
# once - see the "Reminder/notification outbox operations" section in README.md.
app.reminders.scheduling-enabled=${REMINDERS_SCHEDULING_ENABLED:true}
app.notifications.dispatch-batch-size=${NOTIFICATIONS_DISPATCH_BATCH_SIZE:50}
app.notifications.max-dispatch-attempts=${NOTIFICATIONS_MAX_DISPATCH_ATTEMPTS:5}
app.notifications.processing-lease-timeout-minutes=${NOTIFICATIONS_PROCESSING_LEASE_TIMEOUT_MINUTES:5}

# Actuator: only health/info exposed by default (no beans/env/configprops leaking internals over
# HTTP). The `prod` profile (application-prod.properties) restricts this further. Liveness/
# readiness probes are enabled so /actuator/health reports separate liveness/readiness states,
# matched by the Docker HEALTHCHECK and any orchestrator probe.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
