spring.application.name=task-priority-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskpriority}
spring.datasource.username=${DB_USERNAME:taskpriority}
spring.datasource.password=${DB_PASSWORD:taskpriority}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
